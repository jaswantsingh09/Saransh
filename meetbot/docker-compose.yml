# Local dev orchestration for meetbot.
#
# The bot is *not* declared as a long-running service here — the backend
# launches one container per meeting via `docker run`. Compose is only used
# to bring up backend + frontend together, and to share a recordings volume
# with each ephemeral bot container.

services:
  backend:
    build: ./backend
    image: meetbot-backend
    ports:
      - "5168:5168"
    volumes:
      - ./recordings:/app/recordings
      - /var/run/docker.sock:/var/run/docker.sock  # backend spawns bot containers
    environment:
      WHISPER_URL: "http://host.docker.internal:8178"
      MEETILY_URL: "http://host.docker.internal:5167"
      BOT_IMAGE: "meetbot-bot"
      RECORDINGS_HOST_PATH: "${PWD}/recordings"

  frontend:
    build: ./frontend
    image: meetbot-frontend
    ports:
      - "3119:3119"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5168"
    depends_on:
      - backend

volumes:
  recordings:
